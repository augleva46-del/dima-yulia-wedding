<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дмитрий & Юлия</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #fffaf9;
  color: #4e3f3f;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('1.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.4);
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  z-index:2;
}

/* POLAROID */
.polaroid-section {
  padding: 60px 20px;
  position: relative;
}

.polaroid {
  width: 220px;
  background: white;
  padding: 10px 10px 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  position: absolute;
  transition: 0.5s;
}

.polaroid img {
  width: 100%;
}

.polaroid:hover {
  transform: scale(1.05) rotate(0deg);
  z-index: 5;
}

/* разные наклоны */
.p1 { top: 50px; left: 10%; transform: rotate(-8deg); }
.p2 { top: 200px; right: 10%; transform: rotate(6deg); }
.p3 { top: 400px; left: 20%; transform: rotate(4deg); }
.p4 { top: 600px; right: 15%; transform: rotate(-6deg); }

/* SECTION */
.section {
  padding: 80px 20px;
  text-align: center;
}

h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 20px;
}

/* BUTTON */
.btn {
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border-radius:30px;
  background:#e8b4b8;
  color:white;
  text-decoration:none;
}

/* TIMER */
.timer {
  font-size: 26px;
}

/* FORM */
form {
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:400px;
  margin:0 auto;
}

input, select, textarea {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* FADE */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.fade.visible {
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:700px){
  .polaroid {
    position: static;
    margin: 20px auto;
    transform: rotate(0deg) !important;
  }
}
</style>
</head>

<body>

<div class="hero">
  <h1>Дмитрий & Юлия<br>21 августа 2026</h1>
</div>

<!-- POLAROID -->
<section class="polaroid-section">
  <div class="polaroid p1"><img src="IMG_0319.jpg"></div>
  <div class="polaroid p2"><img src="кольцо.jpg"></div>
  <div class="polaroid p3"><img src="букет.jpg"></div>
  <div class="polaroid p4"><img src="1.jpg"></div>
</section>

<!-- ПРИГЛАШЕНИЕ -->
<section class="section fade">
  <h2>Приглашение</h2>
  <p>Мы будем счастливы разделить с вами этот особенный день…</p>
</section>

<!-- ДЕТАЛИ -->
<section class="section fade">
  <h2>Детали</h2>
  <p>21.08.2026<br>Magic Moon<br>Весенняя 82</p>
  <a class="btn" href="https://yandex.ru/maps/org/moon_magic/150379280374?si=radhg224wukupfkt0ugcrq9rag">Открыть карту</a>
</section>

<!-- ТАЙМЕР -->
<section class="section fade">
  <h2>До свадьбы осталось</h2>
  <div class="timer" id="timer"></div>
</section>

<!-- БЕЗ ЦВЕТОВ -->
<section class="section fade">
  <h2>Детали</h2>
  <p>Пожалуйста, не дарите цветы 🌸<br>Ваше присутствие — лучший подарок</p>
</section>

<!-- ФОРМА -->
<section class="section fade">
  <h2>Подтверждение</h2>
  <form>
    <input placeholder="Имя">
    <select>
      <option>Буду</option>
      <option>Не смогу</option>
    </select>
    <textarea placeholder="Комментарий"></textarea>
    <button class="btn">Отправить</button>
  </form>
</section>

<script>
// TIMER
const date = new Date("2026-08-21").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const d = date-now;
  document.getElementById("timer").innerHTML =
    Math.floor(d/1000/60/60/24)+" дней";
},1000);

// ANIMATION
const obs = new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
document.querySelectorAll(".fade").forEach(el=>obs.observe(el));
</script>

</body>
</html>
